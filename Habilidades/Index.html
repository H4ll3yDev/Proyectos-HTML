<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tarjeta de Habilidades</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="caja-habilidades">
        <h2 class="titulo">Mis Habilidades / 1ºDAW</h2>

        <!--html-->
        <div class="barra">
            <div class="info">
                <i class="fab fa-html5"></i>
                HTML
            </div>
            <div class="track">
                <div class="fill" style="--w:95%; --clr:#ff5722; --delay:0.2s;">
                    <span class="tooltip">95%</span>
                </div>
            </div>
        </div>

        <!--CSS-->
        <div class="barra">
            <div class="info">
                <i class="fab fa-css3-alt"></i>
                CSS
            </div>
            <div class="track">
                <div class="fill" style="--w:90%; --clr:#2196f3; --delay:0.4s;">
                    <span class="tooltip">75%</span>
                </div>
            </div>
        </div>

        <!--JS-->
        <div class="barra">
            <div class="info">
                <i class="fab fa-js"></i>
                JavaScript
            </div>
            <div class="track">
                <div class="fill" style="--w:85%; --clr:#f7df1e; --delay:0.6s;">
                    <span class="tooltip">20%</span>
                </div>
            </div>
        </div>

        <!--Java-->
        <div class="barra">
            <div class="info">
                <i class="fab fa-java"></i>
                Java
            </div>
            <div class="track">
                <div class="fill" style="--w:80%; --clr:#e53935; --delay:0.8s;">
                    <span class="tooltip">55%</span>
                </div>
            </div>
        </div>

        <!--Python-->
        <div class="barra">
            <div class="info">
                <i class="fab fa-python"></i>
                Python
            </div>
            <div class="track">
                <div class="fill" style="--w:75%; --clr:#4caf50; --delay:1s;">
                    <span class="tooltip">15%</span>
                </div>
            </div>
        </div>

        <!--C++-->
        <div class="barra">
            <div class="info">
                <i class="fas fa-code"></i>
                C++
            </div>
            <div class="track">
                <div class="fill" style="--w:70%; --clr:#3f51b5; --delay:1.2s;">
                    <span class="tooltip">10%</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
